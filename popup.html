<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Study AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 Video Study AI</h1>
      <p class="subtitle" id="videoTitle">Open a YouTube video to get started</p>
    </header>

    <div id="notOnYoutube" class="state">
      <p>Navigate to a YouTube video and click this extension to summarize it.</p>
    </div>

    <div id="mainActions" class="state hidden">
      <div class="usage-bar">
        <span id="usageText">3/3 free today</span>
        <a href="#" id="upgradeLink" class="upgrade-link hidden">Upgrade</a>
      </div>

      <div class="actions">
        <button id="btnSummary" class="btn btn-primary">📝 Summary</button>
        <button id="btnFlashcards" class="btn btn-secondary">📋 Flashcards</button>
        <button id="btnQuiz" class="btn btn-secondary">❓ Quiz</button>
      </div>

      <div class="actions-row2">
        <button id="btnAsk" class="btn btn-secondary">💬 Ask</button>
        <button id="btnSpeak" class="btn btn-secondary">🔊 Listen</button>
      </div>

      <!-- Q&A input -->
      <div id="askContainer" class="ask-container hidden">
        <input type="text" id="askInput" placeholder="Ask anything about this video..." />
        <button id="askSubmit" class="btn btn-primary btn-small">Ask</button>
      </div>

      <div id="result" class="result hidden">
        <div id="resultContent"></div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p id="loadingText">Generating...</p>
      </div>

      <div id="quizContainer" class="quiz hidden"></div>
    </div>

    <div id="premiumGate" class="state hidden">
      <p>You've used your free summaries for today.</p>
      <button id="btnSubscribe" class="btn btn-primary">⭐ Get Premium — $5/month</button>
      <p class="small">Unlimited summaries, flashcards & quizzes</p>
    </div>

    <!-- Settings panel -->
    <div id="settingsPanel" class="state hidden">
      <h2>⚙️ Settings</h2>

      <div class="setting-group">
        <label for="langSelect">Summary Language</label>
        <select id="langSelect">
          <option value="English">English</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Arabic">Arabic</option>
          <option value="Hindi">Hindi</option>
          <option value="Chinese">Chinese</option>
          <option value="Japanese">Japanese</option>
          <option value="Korean">Korean</option>
          <option value="Russian">Russian</option>
          <option value="Italian">Italian</option>
          <option value="Turkish">Turkish</option>
          <option value="Dutch">Dutch</option>
          <option value="Polish">Polish</option>
          <option value="Urdu">Urdu</option>
          <option value="Bengali">Bengali</option>
          <option value="Tamil">Tamil</option>
          <option value="Telugu">Telugu</option>
          <option value="Indonesian">Indonesian</option>
        </select>
      </div>

      <div class="setting-actions">
        <button id="saveSettings" class="btn btn-primary">Save</button>
        <button id="cancelSettings" class="btn btn-secondary">Back</button>
      </div>
    </div>

    <footer>
      <a href="#" id="settingsLink">Settings</a>
      <span class="separator">•</span>
      <a href="#" id="feedbackLink">Feedback</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
